<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REX DINER - Open 24/7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Enseigne lumineuse -->
    <header class="neon-header">
        <div class="stars"></div>
        <div class="dino-icon">🦖</div>
        <h1 class="neon-text" id="restaurant-nom">REX DINER</h1>
        <p class="subtitle" id="restaurant-slogan">Open 24/7</p>
        <p class="promo-badge" id="promo-texte">⭐ 5 menus achetés = 1 offert ! ⭐</p>
        <div class="dino-icon">🦕</div>
    </header>

    <!-- Barre du panier -->
    <div class="panier-bar" id="panier-bar">
        <button class="panier-toggle" id="panier-toggle">
            🛒 Panier <span class="panier-compteur" id="panier-compteur">0</span>
        </button>
    </div>

    <!-- Panier latéral -->
    <div class="panier-overlay" id="panier-overlay"></div>
    <aside class="panier-sidebar" id="panier-sidebar">
        <div class="panier-header">
            <h2>🦖 Votre commande</h2>
            <button class="panier-fermer" id="panier-fermer">✕</button>
        </div>
        <div class="panier-liste" id="panier-liste">
            <p class="panier-vide">Votre panier est vide</p>
        </div>
        <div class="panier-total" id="panier-total"></div>
    </aside>

    <!-- Navigation catégories -->
    <nav class="categories-nav" id="categories-nav">
        <!-- Généré par JS -->
    </nav>

    <!-- Zone d'affichage des produits -->
    <main class="produits-container" id="produits-container">
        <!-- Généré par JS -->
    </main>

    <!-- Pied de page -->
    <footer class="diner-footer">
        <div class="checkerboard"></div>
        <p>🍔 REX DINER - Open 24/7 - Depuis 1955 🍔</p>
        <p class="footer-dinos">🦖 🦕 🦖 🦕 🦖</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
